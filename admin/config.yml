backend:
  name: github
  repo: DexterTheDeveloper/LandingIIILOBE
  branch: main
  base_url: https://iiiglobe-oauth.godfreyconnection.workers.dev

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:

  # 芒聰聙芒聰聙芒聰聙 冒聼聫聽 HOMEPAGE 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  - name: "homepage"
    label: "冒聼聫聽 Homepage"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "_data/homepage.json"
        fields:
          - { label: "Hero Tagline", name: "tagline", widget: "string" }

          - label: "芒聫鲁 Countdown"
            name: "countdown_target"
            widget: "datetime"
            hint: "When the countdown hits zero the video embed will appear"

          - { label: "Countdown Label", name: "countdown_label", widget: "string", default: "LAUNCHING IN", hint: "Text shown above the timer, e.g. LAUNCHING IN" }

          - { label: "Video URL (embed src)", name: "countdown_video_url", widget: "string", required: false, hint: "YouTube/Vimeo embed src 芒聙聰 leave blank for placeholder until ready" }

          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Facebook URL",    name: "facebook",  widget: "string" }
              - { label: "Instagram URL",   name: "instagram", widget: "string" }
              - { label: "Twitter / X URL", name: "twitter",   widget: "string" }
              - { label: "YouTube URL",     name: "youtube",   widget: "string" }

          - label: "Brand Cards"
            name: "brands"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL",   name: "url",   widget: "string" }
              - { label: "Logo",  name: "logo",  widget: "image", required: false, hint: "Brand logo shown on the homepage pillar" }

  # 芒聰聙芒聰聙芒聰聙 冒聼聯禄 G.E.E.K. RADIO 305 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  - name: "geek-radio"
    label: "冒聼聯禄 G.E.E.K. Radio 305"
    files:
      - name: "geek-radio"
        label: "G.E.E.K. Radio 305"
        file: "_data/geek-radio.json"
        fields:
          - { label: "Page Title",          name: "title",          widget: "string" }
          - { label: "Tagline",             name: "tagline",        widget: "string" }
          - { label: "CTA Button Text",     name: "cta_text",       widget: "string" }
          - { label: "CTA Button URL",      name: "cta_url",        widget: "string" }
          - { label: "About Section Title", name: "about_title",    widget: "string" }
          - { label: "About Body",          name: "about_body",     widget: "text",   hint: "Separate paragraphs with a blank line" }
          - { label: "Section 2 Title",     name: "section2_title", widget: "string" }
          - label: "Featured Shows"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name",        name: "name",        widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image",       name: "image",       widget: "image", required: false }
          - { label: "Particle Count", name: "particle_count", widget: "number", default: 280, hint: "Background particle density" }

