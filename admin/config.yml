backend:
  name: github
  repo: DexterTheDeveloper/LandingIIILOBE
  branch: main
  base_url: https://oauth.godfreyconnection.workers.dev

media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: homepage
    label: "🏠 Homepage"
    files:
      - name: homepage
        label: Homepage
        file: _data/homepage.json
        fields:
          - {label: "Tagline", name: tagline, widget: string}
          - label: "Social Links"
            name: social
            widget: object
            fields:
              - {label: "Facebook URL", name: facebook, widget: string}
              - {label: "Instagram URL", name: instagram, widget: string}
              - {label: "Twitter / X URL", name: twitter, widget: string}
              - {label: "YouTube URL", name: youtube, widget: string}
          - label: "Brand Cards"
            name: brands
            widget: list
            fields:
              - {label: "Label", name: label, widget: string}
              - {label: "URL", name: url, widget: string}
          - {label: "Particle Count", name: particle_count, widget: number, default: 180}

  - name: geek-radio
    label: "📻 G.E.E.K. Radio 305"
    files:
      - name: geek-radio
        label: G.E.E.K. Radio 305
        file: _data/geek-radio.json
        fields:
          - {label: "Page Title", name: title, widget: string}
          - {label: "Tagline", name: tagline, widget: string}
          - {label: "CTA Button Text", name: cta_text, widget: string}
          - {label: "CTA Button URL", name: cta_url, widget: string}
          - {label: "About Section Title", name: about_title, widget: string}
          - {label: "About Body", name: about_body, widget: text}
          - {label: "Section 2 Title", name: section2_title, widget: string}
          - label: "Featured Items"
            name: items
            widget: list
            fields:
              - {label: "Name", name: name, widget: string}
              - {label: "Description", name: description, widget: text}
          - {label: "Particle Count", name: particle_count, widget: number, default: 280}

  - name: kgtv
    label: "📺 KGTV"
    files:
      - name: kgtv
        label: KGTV
        file: _data/kgtv.json
        fields:
          - {label: "Page Title", name: title, widget: string}
          - {label: "Tagline", name: tagline, widget: string}
          - {label: "CTA Button Text", name: cta_text, widget: string}
          - {label: "CTA Button URL", name: cta_url, widget: string}
          - {label: "About Section Title", name: about_title, widget: string}
          - {label: "About Body", name: about_body, widget: text}
          - {label: "Section 2 Title", name: section2_title, widget: string}
          - label: "Featured Items"
            name: items
            widget: list
            fields:
              - {label: "Name", name: name, widget: string}
              - {label: "Description", name: description, widget: text}
          - {label: "Particle Count", name: particle_count, widget: number, default: 280}

  - name: fresh-as-funk
    label: "🎵 Fresh As Funk"
    files:
      - name: fresh-as-funk
        label: Fresh As Funk
        file: _data/fresh-as-funk.json
        fields:
          - {label: "Page Title", name: title, widget: string}
          - {label: "Tagline", name: tagline, widget: string}
          - {label: "CTA Button Text", name: cta_text, widget: string}
          - {label: "CTA Button URL", name: cta_url, widget: string}
          - {label: "About Section Title", name: about_title, widget: string}
          - {label: "About Body", name: about_body, widget: text}
          - {label: "Section 2 Title", name: section2_title, widget: string}
          - label: "Featured Items"
            name: items
            widget: list
            fields:
              - {label: "Name", name: name, widget: string}
              - {label: "Description", name: description, widget: text}
          - {label: "Particle Count", name: particle_count, widget: number, default: 280}
